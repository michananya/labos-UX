<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 716.95 164.92">
  <defs>
    <style>
      .cls-1, .cls-2 {
        stroke: #333;
      }

      .cls-1, .cls-2, .cls-3 {
        fill: none;
        stroke-linecap: round;
        stroke-width: 17px;
      }

      .cls-1, .cls-3 {
        stroke-linejoin: round;
      }

      .cls-2 {
        stroke-miterlimit: 10;
      }

      .cls-3 {
        stroke: #00b08a;
      }

      .draw {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
      }

      .draw-rev {
        stroke-dasharray: 1;
        stroke-dashoffset: -1;
      }

      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      @keyframes breathe {
        0%, 100% { stroke-opacity: 1; }
        50%       { stroke-opacity: 0.72; }
      }

      /* ease-in-out — cubic-bezier(0.42, 0, 0.58, 1)
         Override speed via --draw-speed (default 1 = 2.4s total) */
      .el-cloud {
        animation:
          draw    calc(0.85s * var(--draw-speed, 1)) cubic-bezier(0.42, 0, 0.58, 1) calc(0.05s * var(--draw-speed, 1)) both,
          breathe 3.2s ease-in-out                                                   calc(2.2s  * var(--draw-speed, 1)) infinite;
      }

      .el-divider {
        animation: draw calc(0.3s * var(--draw-speed, 1)) ease-out calc(0.55s * var(--draw-speed, 1)) both;
      }

      .el-note-r {
        animation: draw calc(0.8s * var(--draw-speed, 1)) cubic-bezier(0.42, 0, 0.58, 1) calc(0.75s * var(--draw-speed, 1)) both;
      }

      .el-note-l {
        animation: draw calc(0.8s * var(--draw-speed, 1)) cubic-bezier(0.42, 0, 0.58, 1) calc(0.75s * var(--draw-speed, 1)) both;
      }

      .el-circle {
        animation:
          draw    calc(0.8s * var(--draw-speed, 1)) cubic-bezier(0.42, 0, 0.58, 1) calc(1.1s * var(--draw-speed, 1)) both,
          breathe 3.2s ease-in-out                                                   calc(2.2s * var(--draw-speed, 1)) infinite;
      }

      .el-s {
        animation:
          draw    calc(0.8s * var(--draw-speed, 1)) cubic-bezier(0.42, 0, 0.58, 1) calc(1.6s * var(--draw-speed, 1)) both,
          breathe 3.2s ease-in-out                                                   calc(2.2s * var(--draw-speed, 1)) infinite;
      }
    </style>
  </defs>

  <g>
    <path pathLength="1" class="cls-3 draw-rev el-cloud"
      d="M195.39,156.4H49.82s-41.32,1.93-41.32-38.95c0-37.37,38.71-40.71,38.71-40.71,0,0,.91-22.5,19.57-32.15,19.12-9.89,34.43.18,34.43.18,0,0,5.03-24.98,37.85-34.19,31.93-8.97,56.33,14.04,56.33,14.04"/>

    <line pathLength="1" class="cls-1 draw el-divider"
      x1="222.66" y1="8.5" x2="222.66" y2="156.42"/>

    <path pathLength="1" class="cls-2 draw el-note-r"
      d="M394.68,70.21c5.37-2.28,11.28-3.53,17.48-3.53,24.78,0,44.87,20.09,44.87,44.87s-20.09,44.87-44.87,44.87-44.87-20.09-44.87-44.87V9.06"/>

    <path pathLength="1" class="cls-2 draw el-note-l"
      d="M312.94,152.26c-5.37,2.28-11.28,3.53-17.48,3.53-24.78,0-44.87-20.09-44.87-44.87,0-24.78,20.09-44.87,44.87-44.87s44.87,20.09,44.87,44.87c0,6.2,0,45.49,0,45.49"/>

    <circle pathLength="1" class="cls-3 draw el-circle"
      cx="546.26" cy="92.48" r="63.94"/>

    <path pathLength="1" class="cls-3 draw el-s"
      d="M636.41,136.15s7.35,20.27,36.3,20.27c28.96,0,35.74-23.88,35.74-30.88,0-11.32-2.39-25.63-36.02-33.02-33.63-7.4-36.02-22.98-36.02-33.02,0-7,6.78-30.88,35.74-30.88s36.3,20.27,36.3,20.27"/>
  </g>
</svg>
