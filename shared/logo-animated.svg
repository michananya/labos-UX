<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 716.95 164.92">
  <defs>
    <style>
      .cls-1, .cls-2 {
        stroke: #333;
      }

      .cls-1, .cls-2, .cls-3 {
        fill: none;
        stroke-linecap: round;
        stroke-width: 17px;
      }

      .cls-1, .cls-3 {
        stroke-linejoin: round;
      }

      .cls-2 {
        stroke-miterlimit: 10;
      }

      .cls-3 {
        stroke: #00b08a;
      }

      /* All strokes start hidden via normalized path length */
      .draw {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
      }

      /* Reversed draw — end of path appears first, draws toward start */
      .draw-rev {
        stroke-dasharray: 1;
        stroke-dashoffset: -1;
      }

      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      /* Subtle breathe on green elements after draw completes */
      @keyframes breathe {
        0%, 100% { stroke-opacity: 1; }
        50%       { stroke-opacity: 0.72; }
      }

      /* Cloud — draws from the right anchor leftward */
      .el-cloud {
        animation:
          draw    0.85s cubic-bezier(0.4, 0, 0.2, 1) 0.05s both,
          breathe 3.2s  ease-in-out                  2.2s infinite;
      }

      /* Vertical divider — top to bottom */
      .el-divider {
        animation: draw 0.3s ease-out 0.55s both;
      }

      /* Right music-note shape (tail up) */
      .el-note-r {
        animation: draw 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.75s both;
      }

      /* Left music-note shape (tail down) */
      .el-note-l {
        animation: draw 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.75s both;
      }

      /* Circle — reversed direction */
      .el-circle {
        animation:
          draw    0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.1s both,
          breathe 3.2s ease-in-out                  2.2s infinite;
      }

      /* Final S-curve — reversed direction */
      .el-s {
        animation:
          draw    0.8s cubic-bezier(0.4, 0, 0.2, 1) 1.6s both,
          breathe 3.2s ease-in-out                  2.2s  infinite;
      }
    </style>
  </defs>

  <g>
    <!-- Cloud (green) -->
    <path pathLength="1" class="cls-3 draw-rev el-cloud"
      d="M195.39,156.4H49.82s-41.32,1.93-41.32-38.95c0-37.37,38.71-40.71,38.71-40.71,0,0,.91-22.5,19.57-32.15,19.12-9.89,34.43.18,34.43.18,0,0,5.03-24.98,37.85-34.19,31.93-8.97,56.33,14.04,56.33,14.04"/>

    <!-- Vertical divider -->
    <line pathLength="1" class="cls-1 draw el-divider"
      x1="222.66" y1="8.5" x2="222.66" y2="156.42"/>

    <!-- Right note-shape -->
    <path pathLength="1" class="cls-2 draw el-note-r"
      d="M394.68,70.21c5.37-2.28,11.28-3.53,17.48-3.53,24.78,0,44.87,20.09,44.87,44.87s-20.09,44.87-44.87,44.87-44.87-20.09-44.87-44.87V9.06"/>

    <!-- Left note-shape -->
    <path pathLength="1" class="cls-2 draw el-note-l"
      d="M312.94,152.26c-5.37,2.28-11.28,3.53-17.48,3.53-24.78,0-44.87-20.09-44.87-44.87,0-24.78,20.09-44.87,44.87-44.87s44.87,20.09,44.87,44.87c0,6.2,0,45.49,0,45.49"/>

    <!-- Circle (green) -->
    <circle pathLength="1" class="cls-3 draw el-circle"
      cx="546.26" cy="92.48" r="63.94"/>

    <!-- S-curve (green) -->
    <path pathLength="1" class="cls-3 draw el-s"
      d="M636.41,136.15s7.35,20.27,36.3,20.27c28.96,0,35.74-23.88,35.74-30.88,0-11.32-2.39-25.63-36.02-33.02-33.63-7.4-36.02-22.98-36.02-33.02,0-7,6.78-30.88,35.74-30.88s36.3,20.27,36.3,20.27"/>
  </g>
</svg>
