<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders List — LabOS</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script src="../shared/labos-components.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    background: var(--screen-bg, #ffffff);
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  :root {
    --primary:      #265F68;
    --primary-dark: #1F5156;
    --primary-20:   #D5E0E1;
    --warn:         #D20000;
    --warn-hover:   #B90000;
    --surface:      #F5F5F5;
    --white:        #ffffff;
    --disabled-op:  0.4;
    --transition:   background 150ms ease, opacity 150ms ease,
                    border-color 150ms ease, box-shadow 150ms ease;
  }

  labos-navbar { flex-shrink: 0; }
  .screen-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .screen-top  { padding: 16px 16px 0; flex-shrink: 0; }

  /* ── Search zone ── */
  .search-zone { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .search-autocomplete-wrap { width: 300px; flex-shrink: 0; }
  /* ── Action bar ── */
  .action-bar {
    display: flex; align-items: center; gap: 6px;
    height: 36px; margin-top: 16px; flex-shrink: 0;
  }

  /* ── Grid ── */
  labos-grid { margin: 0 16px; flex: 1; display: flex; flex-direction: column; }



  /* ── Dialog ── */
  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .form-row labos-input,
  .form-row labos-select,
  .form-row labos-autocomplete { flex: 1; min-width: 0; }
  .delete-warn { color: #D20000; font-weight: 600; margin-top: 8px; }

  /* ── Splash ── */
  #splash {
    position: fixed; inset: 0; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.6s ease; --draw-speed: 0.75;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash svg { width: 300px; }
  #splash .greeting {
    font-family: 'Open Sans', sans-serif; font-size: 18px; font-weight: 300; color: #333;
    margin-top: 28px; opacity: 0; animation: splashGreeting 0.8s ease 0.7s both;
  }
  @keyframes splashGreeting {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 716.95 164.92">
  <defs><style>
    .cls-1,.cls-2{stroke:#333}.cls-1,.cls-2,.cls-3{fill:none;stroke-linecap:round;stroke-width:17px}.cls-1,.cls-3{stroke-linejoin:round}.cls-2{stroke-miterlimit:10}.cls-3{stroke:#00b08a}
    .draw{stroke-dasharray:1;stroke-dashoffset:1}.draw-rev{stroke-dasharray:1;stroke-dashoffset:-1}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes breathe{0%,100%{stroke-opacity:1}50%{stroke-opacity:.72}}
    .el-cloud{animation:draw calc(.85s * var(--draw-speed,1)) cubic-bezier(.42,0,.58,1) calc(.05s * var(--draw-speed,1)) both,breathe 3.2s ease-in-out calc(2.2s * var(--draw-speed,1)) infinite}
    .el-divider{animation:draw calc(.3s * var(--draw-speed,1)) ease-out calc(.55s * var(--draw-speed,1)) both}

    .el-s{animation:draw calc(.8s * var(--draw-speed,1)) cubic-bezier(.42,0,.58,1) calc(1.6s * var(--draw-speed,1)) both,breathe 3.2s ease-in-out calc(2.2s * var(--draw-speed,1)) infinite}
  </style></defs>
  <g>

    <line pathLength="1" class="cls-1 draw el-divider" x1="222.66" y1="8.5" x2="222.66" y2="156.42"/>
    <path pathLength="1" class="cls-2 draw el-note-r" d="M394.68,70.21c5.37-2.28,11.28-3.53,17.48-3.53,24.78,0,44.87,20.09,44.87,44.87s-20.09,44.87-44.87,44.87-44.87-20.09-44.87-44.87V9.06"/>
    <path pathLength="1" class="cls-2 draw el-note-l" d="M312.94,152.26c-5.37,2.28-11.28,3.53-17.48,3.53-24.78,0-44.87-20.09-44.87-44.87,0-24.78,20.09-44.87,44.87-44.87s44.87,20.09,44.87,44.87c0,6.2,0,45.49,0,45.49"/>
    <circle pathLength="1" class="cls-3 draw el-circle" cx="546.26" cy="92.48" r="63.94"/>
    <path pathLength="1" class="cls-3 draw el-s" d="M636.41,136.15s7.35,20.27,36.3,20.27c28.96,0,35.74-23.88,35.74-30.88,0-11.32-2.39-25.63-36.02-33.02-33.63-7.4-36.02-22.98-36.02-33.02,0-7,6.78-30.88,35.74-30.88s36.3,20.27,36.3,20.27"/>
  </g>
</svg>
<p id="splash-greeting" class="greeting"></p>
</div>

<!-- ── NAVBAR ── -->
<labos-navbar
  id="navbar"
  breadcrumbs='[{"label":"Orders list"}]'
  user-name="Angela Doe"
  user-org="LabOS NJ Laboratory">
</labos-navbar>

<!-- ── SCREEN BODY ── -->
<main class="screen-body">

  <div class="screen-top">
    <div class="search-zone">
      <div class="search-autocomplete-wrap">
        <labos-rounded-search id="order-search" placeholder="Search for order…"></labos-rounded-search>
      </div>
      <labos-button shape="rounded" icon="add" title="New Order" onclick="openDialog('dialog-add')"></labos-button>
      <labos-button shape="rounded" icon="filter_list" title="Filters"></labos-button>
      <labos-button id="btn-view-toggle" shape="rounded" icon="vertical_split" title="Toggle view" style="margin-left:auto"></labos-button>
    </div>

    <div class="action-bar">
      <labos-button variant="default" icon="check_circle_outline">Release</labos-button>
      <labos-split-button id="btn-print"        label="Print"        icon="print"          variant="default"></labos-split-button>
      <labos-split-button id="btn-distribution" label="Distribution" icon="send"           variant="default"></labos-split-button>

      <labos-button variant="default" icon="print"        title="Print label"></labos-button>
      <labos-button variant="default" icon="receipt_long" title="Print report"></labos-button>
      <labos-button variant="default" icon="email"        title="Email"></labos-button>
      <labos-button variant="default" icon="phone"        title="Call"></labos-button>

      <labos-menu-button id="btn-more" label="More" variant="default"></labos-menu-button>
    </div>
  </div>

  <labos-grid id="grid" title="Orders" mode="infinity-scroll"></labos-grid>

  <labos-master-list id="master-list" style="display:none"></labos-master-list>

</main>

<!-- DIALOG — New Order -->
<labos-dialog id="dialog-add" title="New Order">
  <div class="form-row">
    <labos-autocomplete id="add-patient"  placeholder="Patient"   mandatory></labos-autocomplete>
    <labos-autocomplete id="add-facility" placeholder="Facility"  mandatory></labos-autocomplete>
  </div>
  <div class="form-row">
    <labos-autocomplete id="add-physician" placeholder="Physician" mandatory></labos-autocomplete>
    <labos-select       id="add-status"    placeholder="Status"    mandatory></labos-select>
  </div>
  <labos-input id="add-reason" placeholder="Reason"></labos-input>
  <labos-button slot="footer" variant="default" cancel icon="close"  onclick="closeDialog('dialog-add')">Cancel</labos-button>
  <labos-button slot="footer" variant="accent"        icon="check"   onclick="saveOrder()">Save</labos-button>
</labos-dialog>

<!-- DIALOG — Release confirm -->
<labos-dialog id="dialog-release" title="Release Orders" type="confirm">
  <p>Release the selected order(s) to the laboratory?</p>
  <labos-button slot="footer" variant="default" cancel icon="close"          onclick="closeDialog('dialog-release')">Cancel</labos-button>
  <labos-button slot="footer" variant="accent"        icon="check_circle_outline" onclick="confirmRelease()">Release</labos-button>
</labos-dialog>

<labos-alert id="alert-validation"   type="warning"></labos-alert>

<script>


  // ── Status badge ──────────────────────────────────────────────────────────
  const STATUS_COLOR = {
    'Incomplete': '#F5A623',
    'In process': '#1976D2',
    'Completed':  '#43A047',
    'Cancelled':  '#D20000',
  };
  const statusBadge = v => {
    const bg = STATUS_COLOR[v] || '#999';
    return `<span style="display:inline-block;padding:2px 10px;border-radius:3px;font-size:12px;font-weight:600;background:${bg};color:#fff;white-space:nowrap">${v}</span>`;
  };

  // ── Columns ───────────────────────────────────────────────────────────────
  const COLUMNS = [
    { field: '_open',  label: '', icon: 'open_in_new',         type: 'icon-only', clickable: true,  title: 'Open' },
    { field: '_link',  label: '', icon: 'link',                type: 'icon-only', clickable: true,  title: 'Linked' },
    { field: '_note',  label: '', icon: 'chat_bubble_outline', type: 'icon-only', clickable: false, title: 'Note' },
    { field: '_alert', label: '', icon: 'notifications_none',  type: 'icon-only', clickable: false, title: 'Alert' },
    { field: '_doc',   label: '', icon: 'description',         type: 'icon-only', clickable: false, title: 'Document' },
    { field: '_flag',  label: '', icon: 'circle',              type: 'icon-only', clickable: false, title: 'Flag' },
    { field: 'order',    label: 'Order',    render: v => `<span style="color:#265F68;font-weight:600;cursor:pointer">${v}</span>` },
    { field: 'date',     label: 'Order date' },
    { field: 'onHold',   label: 'On-hold tests', render: v => v > 0 ? `<span style="font-weight:700;color:#D20000">${v}</span>` : '' },
    { field: 'patient',  label: 'Patient name' },
    { field: 'facility', label: 'Facility' },
    { field: 'physician',label: 'Physician' },
    { field: 'reason',   label: 'Reason' },
    { field: 'status',   label: 'Status', render: statusBadge },
  ];

  // ── Data ──────────────────────────────────────────────────────────────────
  let ALL_ROWS = [
    { id:1,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006341', date:'11/14/2025 12:59 AM', onHold:0, patient:'Tayna Edwards',     facility:'Slovakia Medical Center',       physician:'Dr. Stacy Stallings',  reason:'',              status:'Incomplete' },
    { id:2,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006338', date:'11/13/2025 05:11 PM', onHold:0, patient:'Katharina Edwards',  facility:'Alexander II Medical Center',   physician:'Dr. Herman Albright',  reason:'',              status:'Incomplete' },
    { id:3,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006336', date:'11/13/2025 02:26 PM', onHold:0, patient:'Nolan Edwards',      facility:'Boston Medical Center',         physician:'Dr. Rogelio Browne',   reason:'',              status:'Incomplete' },
    { id:4,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006308', date:'11/08/2025 02:59 AM', onHold:0, patient:'Brant Blake',        facility:'Mongolia Medical Center',       physician:'Dr. Daryl Fenner',     reason:'',              status:'In process' },
    { id:5,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006307', date:'11/08/2025 02:59 AM', onHold:0, patient:'Alfonzo Alfaro',     facility:'Mongolia Medical Center',       physician:'Dr. Daryl Fenner',     reason:'',              status:'In process' },
    { id:6,  _open:1,_link:1,_note:1,_alert:0,_doc:0,_flag:0, order:'L0006306', date:'11/08/2025 02:59 AM', onHold:2, patient:'Latrice Adamson',    facility:'St. Pantaenus Nursing Home',    physician:'Dr. Daryl Fenner',     reason:'',              status:'In process' },
    { id:7,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006275', date:'11/06/2025 04:55 PM', onHold:0, patient:'Donette Barclay',    facility:'Wat Tyler Nursing Home',        physician:'Dr. Tyler Simons',     reason:'',              status:'In process' },
    { id:8,  _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006274', date:'11/06/2025 04:55 PM', onHold:0, patient:'Gino Archuleta',     facility:'Doolitle & Doolitle',           physician:'Dr. Tyler Simons',     reason:'',              status:'In process' },
    { id:9,  _open:1,_link:1,_note:0,_alert:0,_doc:1,_flag:0, order:'L0006273', date:'11/06/2025 04:54 PM', onHold:0, patient:'Paul Benavidez',     facility:'Wat Tyler Nursing Home',        physician:'Dr. Tyler Simons',     reason:'',              status:'In process' },
    { id:10, _open:1,_link:1,_note:0,_alert:1,_doc:0,_flag:0, order:'L0006272', date:'11/06/2025 04:54 PM', onHold:0, patient:'Jacqulyn Adamson',   facility:'Meet Me In St. Louis Nursing',  physician:'Dr. Tyler Simons',     reason:'',              status:'In process' },
    { id:11, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006271', date:'11/06/2025 04:53 PM', onHold:0, patient:'Ophelia Aige',       facility:'Wat Tyler Nursing Home',        physician:'Dr. Tyler Simons',     reason:'',              status:'In process' },
    { id:12, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006270', date:'11/06/2025 04:53 PM', onHold:0, patient:'Denisse Abbott',     facility:'One Hundred And One Nursing',   physician:'Dr. Tyler Simons',     reason:'',              status:'Completed'  },
    { id:13, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006269', date:'11/06/2025 04:51 PM', onHold:0, patient:'Wiley Ackerman',     facility:'Brazil Medical Center',         physician:'Dr. Justin Adler',     reason:'',              status:'In process' },
    { id:14, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006268', date:'11/06/2025 04:51 PM', onHold:0, patient:'Grisel Adams',       facility:'Brazil Medical Center',         physician:'Dr. Justin Adler',     reason:'',              status:'In process' },
    { id:15, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006267', date:'11/06/2025 04:51 PM', onHold:0, patient:'Long Ackley',        facility:'Brazil Medical Center',         physician:'Dr. Justin Adler',     reason:'',              status:'In process' },
    { id:16, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:1, order:'L0006266', date:'11/06/2025 04:50 PM', onHold:0, patient:'Demarcus Ackerman',  facility:'Brazil Medical Center',         physician:'Dr. Justin Adler',     reason:'Urgent',        status:'In process' },
    { id:17, _open:1,_link:1,_note:0,_alert:0,_doc:0,_flag:0, order:'L0006265', date:'11/06/2025 04:50 PM', onHold:0, patient:'Suzi Abraham',       facility:'Funny Girl Medical Center',     physician:'Dr. Quinn Alford',     reason:'',              status:'In process' },
    { id:18, _open:1,_link:1,_note:1,_alert:0,_doc:1,_flag:0, order:'L0006264', date:'11/06/2025 04:50 PM', onHold:1, patient:'Maribeth Bass',      facility:'Funny Girl Medical Center',     physician:'Dr. Quinn Alford',     reason:'',              status:'In process' },
  ];
  let nextId = 19;
  let currentRows = [...ALL_ROWS];
  let isSplitView            = false;
  let gridSelectionIndices   = [];
  let masterSelection        = [];
  let masterSelectionIndices = [];

  const grid        = document.getElementById('grid');
  const masterList  = document.getElementById('master-list');
  const detailPanel = masterList.detailPanel;
  const viewToggleBtn = document.getElementById('btn-view-toggle');

  grid.setData(COLUMNS, currentRows);

  // ── Master-list sync ──────────────────────────────────────────────────────
  const BADGE_VARIANT = { 'Incomplete': 'neutral-l', 'In process': 'primary-l', 'Completed': 'accent-l' };

  function syncMasterList(selectedIndices = []) {
    const selSet = new Set(selectedIndices);
    masterList.setData(currentRows.map((r, i) => ({
      row1:     r.order,
      row2:     r.patient,
      row3:     r.facility,
      badge:    { text: r.status, variant: BADGE_VARIANT[r.status] || 'neutral-l' },
      selected: selSet.has(i),
    })));
  }

  function _updateDetailPanel() {
    if (masterSelectionIndices.length === 0) {
      detailPanel.innerHTML = '<p class="detail-empty">Select an order to view details</p>';
      return;
    }
    const r = currentRows[masterSelectionIndices[0]];
    const badgeVariant = BADGE_VARIANT[r.status] || 'neutral-l';
    detailPanel.innerHTML = `
      <div class="item-identity">
        <span class="item-title">${r.order}</span>
        <labos-badge variant="${badgeVariant}">${r.status}</labos-badge>
      </div>
      <div class="item-actions">
        <labos-button variant="default" icon="edit">Edit</labos-button>
        <labos-button variant="default" icon="delete">Delete</labos-button>
        <labos-button variant="default" icon="print">Print</labos-button>
        <labos-button variant="default" icon="check_circle_outline">Release</labos-button>
      </div>
      <div class="detail-content">
        <div class="detail-meta">
          <div class="detail-field"><span class="detail-label">Patient</span><span class="detail-value">${r.patient}</span></div>
          <div class="detail-field"><span class="detail-label">Facility</span><span class="detail-value">${r.facility}</span></div>
          <div class="detail-field"><span class="detail-label">Physician</span><span class="detail-value">${r.physician}</span></div>
          <div class="detail-field"><span class="detail-label">Order date</span><span class="detail-value">${r.date}</span></div>
          ${r.onHold > 0 ? `<div class="detail-field"><span class="detail-label">On-hold tests</span><span class="detail-value" style="color:#D20000">${r.onHold}</span></div>` : ''}
          ${r.reason ? `<div class="detail-field"><span class="detail-label">Reason</span><span class="detail-value">${r.reason}</span></div>` : ''}
        </div>
      </div>`;
  }

  // ── View toggle ───────────────────────────────────────────────────────────
  viewToggleBtn.addEventListener('click', () => {
    isSplitView = !isSplitView;
    if (isSplitView) {
      viewToggleBtn.setAttribute('icon', 'view_headline');
      grid.style.display      = 'none';
      masterList.style.display = 'flex';
      const selIdx = gridSelectionIndices.length > 0 ? gridSelectionIndices : [0];
      syncMasterList(selIdx);
      masterList.setFocus(selIdx[0]);
      masterSelection        = masterList.selectedRows;
      masterSelectionIndices = [...selIdx];
      _updateDetailPanel();
    } else {
      viewToggleBtn.setAttribute('icon', 'vertical_split');
      masterList.style.display = 'none';
      grid.style.display      = '';
      grid.setData(COLUMNS, currentRows);
      if (masterSelectionIndices.length > 0) grid.setSelection(masterSelectionIndices);
      gridSelectionIndices = [...masterSelectionIndices];
    }
  });

  // ── Master-list selection → detail panel ──────────────────────────────────
  masterList.addEventListener('labos-selection-change', e => {
    masterSelection        = e.detail.selected;
    masterSelectionIndices = [...e.detail.indices].sort((a, b) => a - b);
    _updateDetailPanel();
  });

  // ── Grid selection ────────────────────────────────────────────────────────
  grid.addEventListener('labos-selection-change', e => {
    gridSelectionIndices = [...e.detail.indices].sort((a, b) => a - b);
  });

  // ── Search ────────────────────────────────────────────────────────────────
  const orderSearch = document.getElementById('order-search');
  orderSearch.setOptions(ALL_ROWS.map(r => ({ label: r.order, row2: r.patient, value: r.id })));
  orderSearch.addEventListener('labos-select', e => {
    const row = ALL_ROWS.find(r => r.id === e.detail.value);
    if (row) console.log('Open order:', row.order);
  });

  // ── Action bar ────────────────────────────────────────────────────────────
  document.getElementById('btn-print').setItems([
    { label: 'Print labels',   value: 'labels' },
    { label: 'Print reports',  value: 'reports' },
    { label: 'Print barcodes', value: 'barcodes' },
  ]);
  document.getElementById('btn-distribution').setItems([
    { label: 'Send by email', value: 'email' },
    { label: 'Send by fax',   value: 'fax' },
    { label: 'Download PDF',  value: 'pdf' },
  ]);
  document.getElementById('btn-more').setItems([
    { label: 'Export to Excel', value: 'excel' },
    { label: 'Archive',         value: 'archive' },
    { label: 'Set priority',    value: 'priority' },
  ]);

  // ── Release button ────────────────────────────────────────────────────────
  document.querySelector('[icon="check_circle_outline"]')
    .addEventListener('click', () => requireSelection('dialog-release'));

  // ── Add order dialog ──────────────────────────────────────────────────────
  const PATIENTS   = ['Tayna Edwards','Katharina Edwards','Nolan Edwards','Brant Blake','Alfonzo Alfaro','Dana Cohen','Mark Wilson','Sarah Brown'];
  const FACILITIES = ['Slovakia Medical Center','Boston Medical Center','Brazil Medical Center','Wat Tyler Nursing Home','Funny Girl Medical Center'];
  const PHYSICIANS = ['Dr. Stacy Stallings','Dr. Herman Albright','Dr. Rogelio Browne','Dr. Daryl Fenner','Dr. Tyler Simons','Dr. Justin Adler','Dr. Quinn Alford'];

  document.getElementById('add-patient').setOptions(PATIENTS.map(p => ({ label: p, value: p })));
  document.getElementById('add-facility').setOptions(FACILITIES.map(f => ({ label: f, value: f })));
  document.getElementById('add-physician').setOptions(PHYSICIANS.map(p => ({ label: p, value: p })));
  document.getElementById('add-status').setOptions(
    ['Incomplete','In process','Completed'].map(s => ({ label: s, value: s }))
  );

  function openDialog(id)  { document.getElementById(id).show(); }
  function closeDialog(id) { document.getElementById(id).hide(); }

  function validateMandatory(fieldIds) {
    let firstEmpty = null;
    fieldIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (!el.value) { el.setAttribute('invalid', ''); if (!firstEmpty) firstEmpty = el; }
      else           { el.removeAttribute('invalid'); }
    });
    if (firstEmpty) { firstEmpty.focus(); return false; }
    return true;
  }

  function saveOrder() {
    if (!validateMandatory(['add-patient','add-facility','add-physician','add-status'])) return;
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const h = now.getHours(), ampm = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
    const date = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()} ${h12}:${pad(now.getMinutes())} ${ampm}`;
    const id  = nextId++;
    const num = 'L' + String(6341 + id).padStart(7,'0');
    const row = {
      id, _open:1, _link:1, _note:0, _alert:0, _doc:0, _flag:0,
      order: num, date,
      onHold: 0,
      patient:   document.getElementById('add-patient').value,
      facility:  document.getElementById('add-facility').value,
      physician: document.getElementById('add-physician').value,
      reason:    document.getElementById('add-reason').value,
      status:    document.getElementById('add-status').value,
    };
    ALL_ROWS.unshift(row);
    currentRows = [...ALL_ROWS];
    grid.setData(COLUMNS, currentRows);
    closeDialog('dialog-add');
  }

  function requireSelection(dialogId) {
    const sel = isSplitView ? masterSelectionIndices : gridSelectionIndices;
    if (sel.length === 0) {
      openDialog('dialog-no-selection');
      return;
    }
    openDialog(dialogId);
  }

  function confirmRelease() {
    const indices = isSplitView ? masterSelectionIndices : gridSelectionIndices;
    indices.forEach(i => { currentRows[i].status = 'In process'; });
    if (isSplitView) {
      syncMasterList(masterSelectionIndices);
      _updateDetailPanel();
    } else {
      grid.setData(COLUMNS, currentRows);
      gridSelectionIndices = [];
    }
    closeDialog('dialog-release');
  }
</script>
<script>
  (function() {
    var s = document.getElementById('splash');
    var h = new Date().getHours();
    var g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    var parts = (document.querySelector('labos-navbar')?.getAttribute('user-name') || '').trim().split(/\s+/);
    var first = /^(Dr\.|Prof\.|Mr\.|Mrs\.|Ms\.)$/i.test(parts[0]) ? (parts[1] || '') : (parts[0] || '');
    document.getElementById('splash-greeting').textContent = first ? g + ', ' + first : g;
    setTimeout(function() {
      s.classList.add('fade-out');
      s.addEventListener('transitionend', function() { s.remove(); }, { once: true });
    }, 3000);
  })();
</script>

<!-- DIALOG — No selection -->
<labos-dialog id="dialog-no-selection" type="warning" title="Selection required">
  <p style="font-size:14px;color:#333">Please select at least one item</p>
  <labos-button slot="footer" variant="default" icon="check" onclick="closeDialog('dialog-no-selection')">OK</labos-button>
</labos-dialog>
</body>
</html>
