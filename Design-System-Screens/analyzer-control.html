<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Open Sans', 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    background: #ffffff;
    color: #333;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  :root {
    --primary:      #265F68;
    --primary-dark: #1F5156;
    --primary-20:   #D5E0E1;
    --warn:         #D20000;
    --surface:      #F5F5F5;
    --white:        #ffffff;
  }

  labos-navbar { flex-shrink: 0; }
  .screen-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .screen-top  { padding: 16px 16px 0; flex-shrink: 0; }

  .search-zone { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .action-bar  { display: flex; align-items: center; gap: 8px; height: 36px; margin-top: 16px; flex-shrink: 0; }

  labos-grid        { margin: 0 16px; flex: 1; display: flex; flex-direction: column; }
  labos-master-list { flex: 1; min-height: 0; }

  /* ── Master-list detail panel ── */
  .detail-empty    { padding: 24px 16px; color: #999; font-size: 13px; }
  .is-bar          { display:flex; align-items:center; height:40px; background:#fff; overflow:hidden; border-bottom:1px solid #eee; }
  .is-sep          { flex-shrink:0; width:1px; align-self:stretch; background:#dddddd; margin:0 10px; }
  .is-c            { display:flex; flex-direction:column; height:40px; flex-shrink:0; }
  .is-c__v         { padding-top:8px; font:400 14px/14px 'Open Sans',sans-serif; color:#333; white-space:nowrap; letter-spacing:.1px; }
  .is-c__lbl       { margin-top:5px; font:600 11px/11px 'Open Sans',sans-serif; color:#999; white-space:nowrap; letter-spacing:.1px; }
  .is-id           { display:flex; align-items:center; flex-shrink:0; padding-left:8px; }
  .is-id__body     { display:flex; flex-direction:column; height:40px; padding-top:4px; padding-bottom:2px; justify-content:space-between; }
  .is-id__row1     { display:flex; align-items:flex-end; gap:8px; }
  .is-id__name     { font:600 20px/1 'Open Sans',sans-serif; color:#333; letter-spacing:.1px; white-space:nowrap; }
  .is-id__chip     { background:#fff; border:1px solid #ccc; border-radius:3px; padding:0 7px; height:19px; display:inline-flex; align-items:center; font:600 11px/1 'Open Sans',sans-serif; color:#333; white-space:nowrap; }
  .is-id__chip--gn { background:#5aba47; border-color:#5aba47; color:#fff; }
  .is-id__sub      { font:600 11px/1 'Open Sans',sans-serif; color:#999; letter-spacing:.1px; white-space:nowrap; }
  .item-actions    { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
  .detail-content  { padding: 16px; }
  .detail-meta     { display: flex; flex-direction: column; gap: 10px; }
  .detail-field    { display: flex; flex-direction: column; gap: 2px; }
  .detail-label    { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  .detail-value    { font-size: 14px; color: #333; }

  /* ── Splash ── */
  #splash {
    position: fixed; inset: 0; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; transition: opacity 0.6s ease; --draw-speed: 0.75;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash svg { width: 300px; }
  #splash .greeting {
    font-family: 'Open Sans', sans-serif; font-size: 18px; font-weight: 300; color: #333;
    margin-top: 28px; opacity: 0; animation: splashGreeting 0.8s ease 0.7s both;
  }
  @keyframes splashGreeting {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<!-- ── SPLASH JS ── -->
<script>
  (function() {
    var s = document.getElementById('splash');
    var isReload = (performance.getEntriesByType('navigation')[0] || {}).type === 'reload';
    var fromNav  = sessionStorage.getItem('labos_nav') === '1';
    sessionStorage.removeItem('labos_nav');
    if (!isReload && fromNav) { s.remove(); return; }
    var h = new Date().getHours();
    var g = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    var parts = (document.querySelector('labos-navbar').getAttribute('user-name') || '').trim().split(/\s+/);
    var first = /^(Dr\.|Prof\.|Mr\.|Mrs\.|Ms\.)$/i.test(parts[0]) ? (parts[1] || '') : (parts[0] || '');
    document.getElementById('splash-greeting').textContent = first ? g + ', ' + first : g;
    setTimeout(function() {
      s.classList.add('fade-out');
      s.addEventListener('transitionend', function() { s.remove(); }, { once: true });
    }, 3000);
  })();
</script>

<script>
  document.addEventListener('click', function(e) {
    var path = e.composedPath ? e.composedPath() : [];
    var a = path.find(function(el) { return el.tagName === 'A' && el.href && !el.target; });
    if (a && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
      sessionStorage.setItem('labos_nav', '1');
    }
  }, true);
</script>

  var masterList        = document.getElementById('master-list');
  var viewToggleBtn     = document.getElementById('btn-view-toggle');
  var acFilter          = document.getElementById('ac-filter');
  var acNavbar          = document.getElementById('ac-navbar');
  var detailPanel       = masterList.detailPanel;
  var isSplitView       = false;
  var gridSelIdx        = [];
  var masterSelIdx      = [];
  var activeFilterValue = 'dept-hema';

  var FILTER_DEFS = {
    'dept-hema':  { test: function(r) { return r.department === 'Hematology';   }, chips: [{ label: 'Department', value: 'Hematology',   key: 'department' }] },
    'dept-chem':  { test: function(r) { return r.department === 'Chemistry';    }, chips: [{ label: 'Department', value: 'Chemistry',    key: 'department' }] },
    'dept-coag':  { test: function(r) { return r.department === 'Coagulation';  }, chips: [{ label: 'Department', value: 'Coagulation',  key: 'department' }] },
    'dept-micro': { test: function(r) { return r.department === 'Microbiology'; }, chips: [{ label: 'Department', value: 'Microbiology', key: 'department' }] },
    'dept-immu':  { test: function(r) { return r.department === 'Immunology';   }, chips: [{ label: 'Department', value: 'Immunology',   key: 'department' }] },
    'qc-fail':    { test: function(r) { return r.qc === 'Failed' || r.qc === 'Patient controls failed'; }, chips: [{ label: 'QC', value: 'Failed / Patient controls failed', key: 'qc' }] },
    'unmatched':  { test: function(r) { return r.unmatched > 0; }, chips: [{ label: 'Unmatched results', value: '> 0', key: 'unmatched' }] },
  };

  function currentData() {
    var rows = ALL_ROWS;
    if (activeFilterValue && FILTER_DEFS[activeFilterValue]) {
      rows = rows.filter(FILTER_DEFS[activeFilterValue].test);
    }
    var q = searchText.toLowerCase();
    if (!q) return rows;
    return rows.filter(function(r) {
      return r.analyzer.toLowerCase().includes(q) ||
             r.department.toLowerCase().includes(q) ||
             r.ip.includes(q) ||
             r.exe.toLowerCase().includes(q);
    });
  }

  function applyFilters() {
    grid.setData(COLUMNS, currentData());
  }

  applyFilters();
  document.fonts.ready.then(function() { applyFilters(); });

  // ── Search autocomplete ────────────────────────────────────────────────────
  var mainSearch = document.getElementById('main-search');

  mainSearch.setOptions(ALL_ROWS.map(function(r) {
    return { label: r.analyzer, row2: r.department, value: r.analyzer };
  }));

  mainSearch.addEventListener('labos-input', function(e) {
    searchText = (e.detail && e.detail.value) || '';
    applyFilters();
    if (isSplitView) syncMasterList();
  });

  mainSearch.addEventListener('labos-select', function(e) {
    searchText = e.detail.label || '';
    applyFilters();
    if (isSplitView) syncMasterList();
  });

  // ── View toggle ───────────────────────────────────────────────────────────
  function syncMasterList(selectedIndices) {
    var rows = currentData();
    var selSet = new Set(selectedIndices || []);
    masterList.setData(rows.map(function(r, i) {
      return {
        row1:     r.analyzer,
        row2:     r.department,
        row3:     r.lastComm,
        selected: selSet.has(i),
      };
    }));
  }

  function updateDetailPanel() {
    var rows = currentData();
    if (!masterSelIdx.length) {
      detailPanel.innerHTML = '<p class="detail-empty">Select an analyzer to view details</p>';
      return;
    }
    var r = rows[masterSelIdx[0]];
    if (!r) { detailPanel.innerHTML = '<p class="detail-empty">Select an analyzer to view details</p>'; return; }
    detailPanel.style.overflowY       = 'hidden';
    detailPanel.style.display         = 'flex';
    detailPanel.style.flexDirection   = 'column';
    var S = {
      bar:   'display:flex;align-items:center;height:40px;background:#fff;overflow:hidden',
      wrap:  'padding:12px 16px 0',
      sep:   'flex-shrink:0;width:1px;align-self:stretch;background:#dddddd;margin:0 10px',
      cell:  'display:flex;flex-direction:column;height:40px;flex-shrink:0',
      val:   'padding-top:8px;font:400 14px/14px \'Open Sans\',sans-serif;color:#333;white-space:nowrap;letter-spacing:.1px',
      lbl:   'margin-top:5px;font:600 11px/11px \'Open Sans\',sans-serif;color:#999;white-space:nowrap;letter-spacing:.1px',
      id:    'display:flex;align-items:center;flex-shrink:0',
      body:  'display:flex;flex-direction:column;height:40px;padding-top:4px;padding-bottom:2px;justify-content:space-between',
      row1:  'display:flex;align-items:flex-end;gap:4px',
      name:  'font:600 20px/1 \'Open Sans\',sans-serif;color:#333;letter-spacing:.1px;white-space:nowrap',
      sub:   'font:600 11px/1 \'Open Sans\',sans-serif;color:#999;letter-spacing:.1px;white-space:nowrap',
    };
    function isCell(val, lbl) {
      return '<div style="' + S.cell + '"><div style="' + S.val + '">' + val + '</div><div style="' + S.lbl + '">' + lbl + '</div></div>';
    }
    var commColor = COMM_COLOR[r.communication] || '#999999';
    var commCircle = '<span class="comm-circle" data-tip="' + r.communication + '" style="font-family:\'Material Icons\';font-size:16px;color:' + commColor + ';line-height:1;flex-shrink:0;align-self:center;cursor:default">circle</span>';
    var page  = masterSelIdx[0] + 1;
    var total = rows.length;
    detailPanel.innerHTML =
      '<div style="' + S.wrap + '">' +
        '<div style="display:flex;align-items:center;gap:12px">' +
          '<div style="' + S.bar + ';flex:1;min-width:0">' +
            '<div style="' + S.id + '"><div style="' + S.body + '">' +
              '<div style="' + S.row1 + '">' + commCircle + '<span style="' + S.name + '">' + r.analyzer + '</span>' + qcChip(r.qc) + '</div>' +
              '<div style="' + S.sub + '">Analyzer</div>' +
            '</div></div>' +
            '<div style="' + S.sep + '"></div>' + isCell(r.department, 'Department') +
            '<div style="' + S.sep + '"></div>' + isCell(r.ip, 'Terminal') +
            '<div style="' + S.sep + '"></div>' + isCell(r.port, 'Port') +
            '<div style="' + S.sep + '"></div>' + isCell(r.exe, 'EXE') +
            '<div style="' + S.sep + '"></div>' + isCell(r.lastComm, 'Last communication') +
          '</div>' +
          '<labos-arrows-navigation class="detail-nav" page="' + page + '" total="' + total + '" style="flex-shrink:0"></labos-arrows-navigation>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap">' +
        '<labos-button variant="default" icon="play_arrow">Run</labos-button>' +
        '<labos-button variant="default" icon="stop">Stop</labos-button>' +
      '</div>' +
      '<labos-tabs class="detail-tabs" style="padding:0 16px"></labos-tabs>' +
      '<labos-tab-panel class="detail-tab-panel" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column"></labos-tab-panel>';
    var circleEl = detailPanel.querySelector('.comm-circle');
    if (circleEl) {
      circleEl.addEventListener('mouseover', function() {
        var tip = _getGridTip();
        tip.textContent = circleEl.dataset.tip;
        tip.style.display = 'block';
        var rect = circleEl.getBoundingClientRect();
        var x = rect.left + rect.width / 2 - tip.offsetWidth / 2;
        var y = rect.top - tip.offsetHeight - 6;
        tip.style.left = Math.max(4, Math.min(window.innerWidth - tip.offsetWidth - 4, x)) + 'px';
        tip.style.top  = Math.max(4, y) + 'px';
      });
      circleEl.addEventListener('mouseleave', function() { _getGridTip().style.display = 'none'; });
    }
    var detailTabs  = detailPanel.querySelector('.detail-tabs');
    var detailPanel2 = detailPanel.querySelector('.detail-tab-panel');
    function showTabContent(value) {
      if (!detailPanel2) return;
      if (value === 'communication') {
        detailPanel2.innerHTML = '<labos-grid class="comm-grid" title="Recent communication" mode="simple" row-expand height="fill" style="margin:0 16px"></labos-grid>';
        var cg = detailPanel2.querySelector('.comm-grid');
        if (cg) {
          cg.setData(COMM_GRID_COLUMNS, COMM_GRID_DATA);
          cg.addEventListener('labos-row-expand', function(e) {
            e.detail.panel.innerHTML = commExpandHTML(e.detail.row);
          });
        }
      } else if (value === 'qc') {
        detailPanel2.innerHTML = '<labos-grid class="qc-grid" title="QC Tests" mode="simple" row-expand height="fill" style="margin:0 16px"></labos-grid>';
        var qg = detailPanel2.querySelector('.qc-grid');
        if (qg) {
          qg.setData(QC_GRID_COLUMNS, QC_GRID_DATA);
          qg.addEventListener('labos-row-expand', function(e) {
            e.detail.panel.innerHTML = qcExpandHTML(e.detail.row);
          });
        }
      } else {
        detailPanel2.innerHTML = '<div style="padding:20px 16px;font:400 13px/1 \'Open Sans\',sans-serif;color:#999">No items found</div>';
      }
    }
    if (detailTabs) {
      detailTabs.setTabs([
        { label: 'Communication', value: 'communication', selected: true },
        { label: 'QC',            value: 'qc' },
        { label: 'Unmatched',     value: 'unmatched' },
      ]);
      detailTabs.addEventListener('labos-change', function(e) { showTabContent(e.detail.value); });
    }
    showTabContent('communication');
    var navEl = detailPanel.querySelector('.detail-nav');
    if (navEl) {
      navEl.addEventListener('labos-change', function(e) {
        var newIdx = e.detail.page - 1;
        var dataLen = currentData().length;
        if (newIdx < 0 || newIdx >= dataLen) return;
        masterSelIdx = [newIdx];
        masterList.setFocus(newIdx);
        syncMasterList(masterSelIdx);
        updateDetailPanel();
      });
    }
  }

  viewToggleBtn.addEventListener('click', function() {
    isSplitView = !isSplitView;
    if (isSplitView) {
      viewToggleBtn.setAttribute('icon', 'view_headline');
      grid.style.display       = 'none';
      masterList.style.display = 'flex';
      var selIdx = gridSelIdx.length > 0 ? gridSelIdx : [0];
      syncMasterList(selIdx);
      masterList.setFocus(selIdx[0]);
      masterSelIdx = selIdx.slice();
      updateDetailPanel();
    } else {
      viewToggleBtn.setAttribute('icon', 'vertical_split');
      masterList.style.display = 'none';
      grid.style.display       = '';
      applyFilters();
      if (masterSelIdx.length) grid.setSelection(masterSelIdx);
      gridSelIdx = masterSelIdx.slice();
    }
  });

  masterList.addEventListener('labos-selection-change', function(e) {
    masterSelIdx = (e.detail.indices ? Array.from(e.detail.indices) : []).sort(function(a, b) { return a - b; });
    updateDetailPanel();
  });

  grid.addEventListener('labos-selection-change', function(e) {
    gridSelIdx = (e.detail.indices ? Array.from(e.detail.indices) : []).sort(function(a, b) { return a - b; });
  });

  // ── Filter ────────────────────────────────────────────────────────────────
  acFilter.setFilters([
    { name: 'Hematology',   count: 3,  value: 'dept-hema'  },
    { name: 'Chemistry',    count: 2,  value: 'dept-chem'  },
    { name: 'Coagulation',  count: 2,  value: 'dept-coag'  },
    { name: 'Microbiology', count: 2,  value: 'dept-micro' },
    { name: 'Immunology',   count: 1,  value: 'dept-immu'  },
    { name: 'QC Failed',    count: 2,  value: 'qc-fail'    },
    { name: 'Unmatched',    count: 4,  value: 'unmatched'  },
  ]);

  acFilter.setActiveFilter({
    name: 'Hematology',
    chips: FILTER_DEFS['dept-hema'].chips,
  });

  function clearActiveFilter() {
    activeFilterValue = null;
    acFilter.clearActiveFilter();
    applyFilters();
    if (isSplitView) syncMasterList();
  }

  document.getElementById('btn-filter').addEventListener('click', function() {
    if (acNavbar) acFilter.setAttribute('top-offset', Math.round(acNavbar.getBoundingClientRect().bottom));
    acFilter.toggle();
  });

  acFilter.addEventListener('labos-filter-select', function(e) {
    activeFilterValue = e.detail.value;
    var def = FILTER_DEFS[activeFilterValue];
    if (def) acFilter.setActiveFilter({ name: e.detail.name, chips: def.chips });
    applyFilters();
    if (isSplitView) syncMasterList();
  });

  acFilter.addEventListener('labos-filter-chip-remove', function() {
    clearActiveFilter();
  });

  acFilter.addEventListener('labos-filter-action', function(e) {
    if (e.detail.action === 'clear') clearActiveFilter();
  });

  acFilter.addEventListener('labos-filter-search', function(e) {
    // gallery search is handled internally by the component
  });

  // ── Action buttons ────────────────────────────────────────────────────────
  document.getElementById('btn-run').addEventListener('click', function() {
    LabosToast.show('Analyzer started.', 'success');
  });

  document.getElementById('btn-stop').addEventListener('click', function() {
    LabosToast.show('Analyzer stopped.', 'info');
  });

  document.getElementById('btn-log').setItems([
    { label: 'Error log', value: 'error-log' },
    { label: 'Download',  value: 'download'  },
  ]);
  document.getElementById('btn-log').addEventListener('labos-action', function() {
    LabosToast.show('Log opened.', 'info');
  });
  document.getElementById('btn-log').addEventListener('labos-select', function(e) {
    if (e.detail.value === 'error-log') LabosToast.show('Error log opened.', 'info');
    if (e.detail.value === 'download')  LabosToast.show('Log downloaded.', 'success');
  });
</script>

</body>
</html>
